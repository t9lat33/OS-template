  <style>
    body{
        font-family: sans-serif;
        background-color: rgb(145, 85, 0);
    }
    .navbar {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      height: 56px;
         background: linear-gradient(160deg,
        rgb(15, 15, 15),
        rgb(10, 10, 10)
      );
      border: 1px solid rgb(57, 57, 57);
      border-radius: 15px;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      padding: 0 10px;
      backdrop-filter: blur(2px) saturate(140%);
       box-shadow: 
    0 12px 28px rgba(0,0,0,0.45),
    0 0 0 1px rgba(255,255,255,0.15) inset;
      transition: height 0.2s ease, border-radius 0.2s ease, border-color 0.2s ease;
      opacity: 0.92;
      z-index: 9999;
      will-change: height, border-radius;

    }

    .navbar:hover {
      border: 1px solid rgb(57, 57, 57);
    }

    .navbar::after {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      pointer-events: none;
      background: radial-gradient(circle at center,  rgba(255,255,255,0.08), transparent 70%);
      opacity: 1;
      transition: opacity 0.2s ease;
    }

    .navbar:hover::after {
      opacity: 1;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.08), transparent 70%);
    }

    .navbar img {
      width: 30px;
      height: 30px;
      transition: transform 0.15s ease;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,.6));
      cursor: pointer;
      will-change: transform;
    }

    .navbar img:hover {
      transform: scale(1.25) translateY(-3px);
    }
    .navbar img:active{
        transform: scale(0.97);
    }
